name: Daily Scraping & Email Report

on:
  # Lunes a viernes a las 8:00 AM hora Lima (UTC-5 = 13:00 UTC)
  schedule:
    - cron: "0 13 * * 1-5"

  # Permite lanzar manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      fuentes:
        description: "Fuentes a ejecutar (separadas por espacio)"
        required: false
        default: "osinergmin el_peruano energiminas minem"
      max_pages:
        description: "Páginas máximas a scrapear (Osinergmin y MINEM)"
        required: false
        default: "3"

env:
  # Los JSONs se guardan aquí dentro del runner (efímero)
  BASE_DATA_DIR: ${{ github.workspace }}/data
  # Rutas a los archivos de credenciales de Gmail
  GMAIL_CREDENTIALS: ${{ github.workspace }}/credentials.json
  GMAIL_TOKEN:       ${{ github.workspace }}/token.json

jobs:
  scrape-and-report:
    name: Scraping + Reporte por correo
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Scraping_Noticias/requirements.txt

      - name: Instalar dependencias
        run: pip install -r Scraping_Noticias/requirements.txt

      # ── 3. Credenciales Gmail (desde Secrets) ────────────────────────
      #
      # IMPORTANTE: debes crear estos dos Secrets en tu repositorio:
      #   Settings → Secrets and variables → Actions → New repository secret
      #
      #   • GMAIL_CREDENTIALS_JSON  → contenido de credentials.json (descargado de Google Cloud Console)
      #   • GMAIL_TOKEN_JSON        → contenido de token.json        (generado la primera vez localmente)
      #
      # Para generar token.json localmente la primera vez:
      #   cd Scraping_Noticias
      #   python -c "from email_report import gmail_service; gmail_service()"
      #   → Abre el navegador, autoriza, y token.json queda guardado.
      #   Copia su contenido como Secret GMAIL_TOKEN_JSON.
      #
      - name: Escribir credentials.json desde Secret
        run: echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json

      - name: Escribir token.json desde Secret
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      # ── 4. Scraping ─────────────────────────────────────────────────
      - name: Ejecutar pipeline de scraping
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          FUENTES="${{ github.event.inputs.fuentes || 'osinergmin el_peruano energiminas minem' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '3' }}"
          python Scraping_Noticias/pipeline.py \
            --fuentes $FUENTES \
            --max-pages $MAX_PAGES

      # ── 5. Envío de correo ──────────────────────────────────────────
      - name: Enviar reporte por Gmail
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python Scraping_Noticias/email_report.py

      # ── 6. Guardar JSONs como artefacto (30 días) ───────────────────
      - name: Subir JSONs del día como artefacto
        if: always()   # guardar incluso si hubo errores parciales
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ github.run_id }}
          path: data/
          retention-days: 30

      # ── 7. Subir log del pipeline ────────────────────────────────────
      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: Scraping_Noticias/logs/
          retention-days: 30
